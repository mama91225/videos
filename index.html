    <style>
        :root {
            --rose-gold: #D4AF37;
            --rose-gold-light: #E8C872;
            --soft-pink: #F8E1E9;
            --deep-pink: #E8B4C4;
            --ivory: #FFFAF0;
            --cream: #FDF5E6;
            --wine: #722F37;
            --gold: #C9A962;
            --text-dark: #3D2914;
            --text-light: #6B5B4F;
            --shadow-soft: 0 8px 32px rgba(212, 175, 55, 0.15);
            --shadow-hover: 0 12px 40px rgba(212, 175, 55, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--ivory) 0%, var(--cream) 50%, var(--soft-pink) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(232, 180, 196, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .hero {
            text-align: center;
            padding: 100px 0 80px;
            position: relative;
        }

        .hero::before,
        .hero::after {
            content: '✦';
            position: absolute;
            font-size: 24px;
            color: var(--rose-gold);
            opacity: 0.6;
            animation: sparkle 3s ease-in-out infinite;
        }

        .hero::before {
            top: 60px;
            left: 20%;
            animation-delay: 0s;
        }

        .hero::after {
            top: 80px;
            right: 20%;
            animation-delay: 1.5s;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .hero-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .decoration-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--rose-gold), transparent);
        }

        .decoration-icon {
            font-size: 20px;
            color: var(--rose-gold);
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            color: var(--wine);
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.2s forwards;
        }

        .hero-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--rose-gold);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.4s forwards;
        }

        .hero-divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--rose-gold), transparent);
            margin: 0 auto 32px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .hero-description {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section {
            padding: 60px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--wine);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .section-title .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--rose-gold);
            font-size: 1.1rem;
        }

        .section-title-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .section-title-divider .line {
            width: 50px;
            height: 1px;
            background: var(--rose-gold-light);
        }

        .section-title-divider .dot {
            width: 6px;
            height: 6px;
            background: var(--rose-gold);
            border-radius: 50%;
        }

        .video-section {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease-out;
        }

        .video-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rose-gold-light), var(--rose-gold), var(--deep-pink));
            z-index: 1;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .video-header {
            padding: 28px 28px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .video-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .video-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--soft-pink), var(--deep-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .video-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--wine);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .video-info p {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .video-switch-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .video-switch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .video-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            padding: 20px;
            background: linear-gradient(135deg, rgba(248, 225, 233, 0.3), rgba(253, 245, 230, 0.5));
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            outline: none;
        }

        .video-container video::-webkit-media-controls {
            background: rgba(0, 0, 0, 0.3);
        }

        .video-container video:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
        }

        .video-container video:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
        }

        .video-container video:-webkit-full-screen-ancestor {
            position: static !important;
        }

        @media screen and (orientation: portrait) {
            .video-container video:-webkit-full-screen {
                transform: rotate(90deg);
                transform-origin: center center;
                width: 100vh !important;
                height: 100vw !important;
            }
        }

        /* 下载弹窗样式 */
        .download-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .download-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-hover);
            position: relative;
            transform: translateY(30px);
            transition: transform 0.3s ease;
        }

        .download-modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--soft-pink);
            border: none;
            color: var(--wine);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--deep-pink);
            transform: rotate(90deg);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--wine);
            margin-bottom: 12px;
        }

        .modal-subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .download-btn {
            padding: 14px 30px;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-mv {
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            color: white;
        }

        .download-full {
            background: linear-gradient(135deg, var(--wine), #923a43);
            color: white;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .photo-section {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease-out;
        }

        .photo-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-info-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .info-item .icon {
            color: var(--rose-gold);
            font-size: 1.2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 3/4;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .photo-item.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-item:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-hover);
            z-index: 10;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(61, 41, 20, 0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        .photo-overlay-content {
            color: white;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .photo-item:hover .photo-overlay-content {
            transform: translateY(0);
        }

        .photo-overlay-content .photo-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .photo-overlay-content .photo-caption {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .photo-placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--soft-pink), var(--cream));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--rose-gold);
        }

        .photo-placeholder .icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .photo-placeholder .text {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .load-more-container {
            text-align: center;
            margin-top: 40px;
        }

        .load-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
        }

        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.5);
        }

        .load-more-btn:active {
            transform: translateY(0);
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-prev {
            left: -80px;
        }

        .lightbox-next {
            right: -80px;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 1001;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .lightbox-caption {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            text-align: center;
            max-width: 60%;
        }

        .footer {
            text-align: center;
            padding: 60px 0 40px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 80px;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: var(--wine);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .footer-divider {
            width: 60px;
            height: 1px;
            background: var(--rose-gold);
            margin: 0 auto 20px;
        }

        .footer-text {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .footer-hearts {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--deep-pink);
            letter-spacing: 8px;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.5);
        }

        @media (max-width: 768px) {
            .hero {
                padding: 60px 0 40px;
            }

            .video-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .video-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .video-buttons {
                flex-direction: column;
                width: 100%;
            }

            .video-switch-btn {
                width: 100%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .photo-item {
                border-radius: 12px;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }

            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .lightbox-close {
                top: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
            }

            .lightbox-caption {
                top: 20px;
                font-size: 1rem;
                max-width: 50%;
            }

            .photo-info-bar {
                gap: 20px;
            }

            .scroll-top {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
            
            .modal-content {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .video-header {
                padding: 20px 20px 16px;
            }

            .video-wrapper {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hero-decoration">
                <span class="decoration-line"></span>
                <span class="decoration-icon">💒</span>
                <span class="decoration-line"></span>
            </div>
            <h1 class="hero-title">Our Wedding</h1>
            <p class="hero-subtitle">A Lifetime of Love Begins</p>
            <div class="hero-divider"></div>
            <p class="hero-description">
                感谢您见证我们人生中最美好的时刻<br>
                愿这份爱与喜悦，与您共享
            </p>
        </header>

        <section class="section video-section" id="videos">
            <div class="section-title">
                <h2>婚礼视频</h2>
                <p class="subtitle">Wedding Videos</p>
                <div class="section-title-divider">
                    <span class="line"></span>
                    <span class="dot"></span>
                    <span class="line"></span>
                </div>
            </div>

            <div class="video-grid">
                <div class="video-card">
                    <div class="video-header">
                        <div class="video-header-left">
                            <div class="video-icon">📽️</div>
                            <div class="video-info">
                                <h3>婚礼MV</h3>
                                <p id="videoVersion">Wedding MV</p>
                            </div>
                        </div>
                        <div class="video-buttons">
                            <button class="video-switch-btn" id="switchVideoBtn">切换完整视频</button>
                            <button class="video-switch-btn" id="downloadBtn">下载视频</button>
                        </div>
                    </div>
                    <div class="video-wrapper">
                        <div class="video-container">
                            <video id="weddingVideo" controls preload="metadata" poster=""
                                   playsinline webkit-playsinline="true"
                                   x5-video-player-type="h5"
                                   x5-video-player-fullscreen="true"
                                   x5-video-orientation="landscape">
                                <source src="https://myvideos.tos-cn-beijing.volces.com/mvvideo.mp4" type="video/mp4">
                                您的浏览器不支持视频播放
                            </video>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section photo-section" id="photos">
            <div class="section-title">
                <h2>婚纱照相册</h2>
                <p class="subtitle">Wedding Photo Gallery</p>
                <div class="section-title-divider">
                    <span class="line"></span>
                    <span class="dot"></span>
                    <span class="line"></span>
                </div>
            </div>

            <div class="photo-info-bar">
                <div class="info-item">
                    <span class="icon">📷</span>
                    <span id="photoCount">婚礼照片</span>
                </div>
                <div class="info-item">
                    <span class="icon">💝</span>
                    <span>点击放大查看</span>
                </div>
            </div>

            <div class="gallery" id="gallery">
            </div>

            <div class="load-more-container" id="loadMoreContainer">
                <button class="load-more-btn" id="loadMoreBtn">
                    <span>加载更多照片</span>
                    <span>↓</span>
                </button>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-content">
                <p class="footer-quote">
                    "爱是永恒的，爱是不自私的，<br>
                    爱是不计算人的恶，凡事包容，<br>
                    凡事相信，凡事盼望，凡事忍耐。"
                </p>
                <div class="footer-divider"></div>
                <p class="footer-text">
                    感谢您浏览我们的婚礼纪念相册<br>
                    愿每一张照片都能传递我们的幸福与喜悦
                </p>
                <div class="footer-hearts">
                    ♥ ♥ ♥
                </div>
            </div>
        </footer>
    </div>

    <!-- 下载选择弹窗 -->
    <div class="download-modal" id="downloadModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">✕</button>
            <h3 class="modal-title">选择下载视频</h3>
            <p class="modal-subtitle">Choose the video to download</p>
            <div class="download-buttons">
                <button class="download-btn download-mv" id="downloadMv">
                    🎥 下载婚礼MV
                </button>
                <button class="download-btn download-full" id="downloadFull">
                    🎬 下载完整视频
                </button>
            </div>
        </div>
    </div>

    <button class="scroll-top" id="scrollTop" title="返回顶部">
        ↑
    </button>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <div class="lightbox-content">
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
            <img src="" alt="" id="lightboxImage">
            <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
        </div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script>
        const PHOTOS_DIR = 'https://myvideos.tos-cn-beijing.volces.com/photos/';
        const TOTAL_PHOTOS = 50;
        const PHOTOS_PER_PAGE = 16;
        const PHOTO_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp'];

        // 下载链接配置
        const downloadLinks = {
            mv: "https://myvideos.tos-cn-beijing.volces.com/mvvideo.mp4",
            full: "https://myvideos.tos-cn-beijing.volces.com/fullvideo.mp4"
        };

        // 获取下载弹窗元素
        const downloadModal = document.getElementById('downloadModal');
        const downloadBtn = document.getElementById('downloadBtn');
        const modalClose = document.getElementById('modalClose');
        const downloadMv = document.getElementById('downloadMv');
        const downloadFull = document.getElementById('downloadFull');

        // 打开下载弹窗
        function openDownloadModal() {
            downloadModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭下载弹窗
        function closeDownloadModal() {
            downloadModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 下载函数
        function downloadVideo(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = '';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            closeDownloadModal();
        }

        // 绑定事件
        downloadBtn.addEventListener('click', openDownloadModal);
        modalClose.addEventListener('click', closeDownloadModal);
        downloadMv.addEventListener('click', () => downloadVideo(downloadLinks.mv));
        downloadFull.addEventListener('click', () => downloadVideo(downloadLinks.full));

        // 点击弹窗外部关闭
        downloadModal.addEventListener('click', (e) => {
            if (e.target === downloadModal) {
                closeDownloadModal();
            }
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && downloadModal.classList.contains('active')) {
                closeDownloadModal();
            }
        });

        // 视频切换功能
        const videoSources = {
            mv: "https://myvideos.tos-cn-beijing.volces.com/mvvideo.mp4",
            full: "https://myvideos.tos-cn-beijing.volces.com/fullvideo.mp4"
        };

        let currentVideo = 'mv';
        const switchVideoBtn = document.getElementById('switchVideoBtn');
        const weddingVideo = document.getElementById('weddingVideo');
        const videoVersion = document.getElementById('videoVersion');
        const videoTitle = weddingVideo.parentElement.querySelector('h3');

        function switchVideo() {
            const wasPlaying = !weddingVideo.paused;
            const currentTime = weddingVideo.currentTime;
            
            if (currentVideo === 'mv') {
                currentVideo = 'full';
                switchVideoBtn.textContent = '切换婚礼MV';
                videoVersion.textContent = 'Full Video';
            } else {
                currentVideo = 'mv';
                switchVideoBtn.textContent = '切换完整视频';
                videoVersion.textContent = 'Wedding MV';
            }

            const sourceElement = weddingVideo.querySelector('source');
            sourceElement.src = videoSources[currentVideo];
            weddingVideo.load();
            
            if (wasPlaying) {
                weddingVideo.currentTime = currentTime;
                weddingVideo.play().catch(() => {});
            }
        }

        switchVideoBtn.addEventListener('click', switchVideo);

        const photoList = [];
        for (let i = 1; i <= TOTAL_PHOTOS; i++) {
            const num = String(i).padStart(3, '0');
            photoList.push({
                id: i,
                src: `${PHOTOS_DIR}${num}.jpg`,
                caption: `照片 ${i}`,
                number: num
            });
        }

        let currentPhotoIndex = 0;
        let loadedPhotos = 0;

        const gallery = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        const photoCount = document.getElementById('photoCount');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const lightboxCounter = document.getElementById('lightboxCounter');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');
        const scrollTopBtn = document.getElementById('scrollTop');

        photoCount.textContent = `共 ${TOTAL_PHOTOS} 张照片`;

        function createPhotoItem(photo, index) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            item.dataset.index = index;
            
            item.innerHTML = `
                <div class="photo-placeholder">
                    <span class="icon">💝</span>
                    <span class="text">加载中...</span>
                </div>
                <div class="photo-overlay">
                    <div class="photo-overlay-content">
                        <div class="photo-number">#${photo.number}</div>
                        <div class="photo-caption">${photo.caption}</div>
                    </div>
                </div>
            `;

            const img = new Image();
            const handleImageLoad = () => {
                item.querySelector('.photo-placeholder').style.display = 'none';
                item.insertBefore(img, item.firstChild);
                setTimeout(() => {
                    item.classList.add('loaded');
                }, index * 50);
            };
            const handleImageError = () => {
                item.querySelector('.photo-placeholder').innerHTML = `
                    <span class="icon">🖼️</span>
                    <span class="text">照片 ${photo.number}</span>
                `;
                setTimeout(() => {
                    item.classList.add('loaded');
                }, index * 50);
            };
            img.onload = handleImageLoad;
            img.onerror = handleImageError;
            img.alt = photo.caption;
            img.src = photo.src;

            if (img.complete) {
                if (img.naturalWidth > 0) {
                    handleImageLoad();
                } else {
                    handleImageError();
                }
            }

            item.addEventListener('click', () => openLightbox(index));

            return item;
        }

        function loadMorePhotos() {
            const start = loadedPhotos;
            const end = Math.min(start + PHOTOS_PER_PAGE, photoList.length);
            
            const fragment = document.createDocumentFragment();
            for (let i = start; i < end; i++) {
                fragment.appendChild(createPhotoItem(photoList[i], i));
            }
            gallery.appendChild(fragment);
            
            loadedPhotos = end;
            
            if (loadedPhotos >= photoList.length) {
                loadMoreContainer.style.display = 'none';
            }
        }

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const photo = photoList[currentPhotoIndex];
            lightboxImage.src = photo.src;
            lightboxImage.alt = photo.caption;
            lightboxCaption.textContent = photo.caption;
            lightboxCounter.textContent = `${currentPhotoIndex + 1} / ${photoList.length}`;
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photoList.length) % photoList.length;
            updateLightbox();
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photoList.length;
            updateLightbox();
        }

        loadMoreBtn.addEventListener('click', loadMorePhotos);
        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', prevPhoto);
        lightboxNext.addEventListener('click', nextPhoto);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            switch (e.key) {
                case 'Escape':
                    closeLightbox();
                    break;
                case 'ArrowLeft':
                    prevPhoto();
                    break;
                case 'ArrowRight':
                    nextPhoto();
                    break;
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;

        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        lightbox.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextPhoto();
                } else {
                    prevPhoto();
                }
            }
        }

        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.video-section, .photo-section').forEach(section => {
            observer.observe(section);
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        loadMorePhotos();
    </script>
</body>
</html>
